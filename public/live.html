<!doctype html>
<html lang="vi">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Live GPS · Waterbus</title>
    <link rel="icon" href="/favicon.png" type="image/png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="/styles.css">
    <link rel="stylesheet" href="/live.css">
  </head>
  <body class="live-page">
    <div id="toastHost" class="toast-host" aria-live="polite" aria-atomic="true"></div>
    <div id="boatContextMenu" class="live-ctx-menu" hidden>
      <p class="live-ctx-title" id="boatCtxTitle">Tàu</p>
      <button type="button" id="boatCtxToggleLock">Mở khóa kéo</button>
      <button type="button" id="boatCtxRotateLeft">Xoay trái 15°</button>
      <button type="button" id="boatCtxRotateRight">Xoay phải 15°</button>
      <div class="live-ctx-heading-pad" role="group" aria-label="Hướng mũi tàu">
        <button type="button" id="boatCtxHeadNorth" title="Bắc">↑</button>
        <button type="button" id="boatCtxHeadWest" title="Tây">←</button>
        <button type="button" id="boatCtxHeadEast" title="Đông">→</button>
        <button type="button" id="boatCtxHeadSouth" title="Nam">↓</button>
      </div>
    </div>

    <div class="live-shell">
      <div id="map" class="live-map"></div>

      <aside class="live-panel" id="livePanel">
        <div class="live-panel-top">
          <header class="live-brand">
            <p class="live-eyebrow">Saigon Waterbus</p>
            <h1>Live GPS</h1>
            <p class="live-lead">Chuột phải tàu → mở khóa kéo / xoay hướng.</p>
          </header>
          <button
            type="button"
            id="toggleLivePanelBtn"
            class="live-panel-toggle"
            title="Thu gọn / mở rộng"
            aria-expanded="true"
            aria-controls="livePanelBody"
          >
            <span class="live-panel-toggle-icon" aria-hidden="true">‹</span>
          </button>
        </div>

        <div class="live-panel-body" id="livePanelBody">
          <nav class="live-nav">
            <a href="/" aria-current="page">Live GPS</a>
            <button type="button" id="openSurveyBtn" class="live-nav-btn">Bảng vẽ</button>
          </nav>

          <label class="live-field">
            <span>Tàu GPS</span>
            <select id="boatSelect">
              <option value="">Chọn tàu...</option>
            </select>
            <small id="deviceHint" class="live-hint">Chọn tàu, chuột phải để mở khóa.</small>
          </label>

          <label class="live-field">
            <span>Vận tốc (km/h)</span>
            <input id="speedInput" type="number" min="0" max="80" step="1" value="16" disabled>
          </label>

          <label class="live-field live-toggle">
            <span>Gửi Azure</span>
            <select id="sendAzureSelect">
              <option value="on">Bật</option>
              <option value="off">Tắt (local)</option>
            </select>
          </label>

          <div class="live-actions live-actions-3">
            <button id="centerBoatBtn" type="button" class="secondary" disabled>Focus tàu</button>
            <button id="sendNowBtn" type="button" class="secondary" disabled>Gửi GPS</button>
            <button id="refreshBtn" type="button" class="secondary">Làm mới</button>
          </div>

          <section class="live-status" id="statusCard">
            <div class="live-status-row">
              <span>Trạng thái</span>
              <b id="boatPhaseStatus">—</b>
            </div>
            <div class="live-status-row">
              <span>Gửi gần nhất</span>
              <b id="sendStatus">Chưa gửi</b>
            </div>
          </section>

          <footer class="live-legend">
            <span><i class="leg-deck1"></i> 1 tầng</span>
            <span><i class="leg-deck2"></i> 2 tầng</span>
            <span><i class="leg-incident"></i> Sự cố</span>
            <span><i class="leg-rescue"></i> Tàu cứu</span>
          </footer>
        </div>
      </aside>
    </div>

    <div id="surveyOverlay" class="survey-overlay" hidden>
      <header class="survey-overlay-bar">
        <div>
          <p class="survey-overlay-eyebrow">Saigon Waterbus</p>
          <strong>Bảng vẽ Survey</strong>
        </div>
        <button type="button" id="closeSurveyBtn" class="secondary">Đóng</button>
      </header>
      <iframe id="surveyFrame" class="survey-overlay-frame" title="Bảng vẽ Survey" src="about:blank"></iframe>
    </div>

    <!-- Hidden status hooks — JS vẫn cập nhật được nếu cần, không chiếm panel -->
    <span id="hubStatus" hidden></span>
    <span id="incidentsHubStatus" hidden></span>
    <span id="coordStatus" hidden></span>
    <span id="boatDbStatus" hidden></span>
    <span id="boatRouteStatus" hidden></span>
    <span id="incidentsHubHint" hidden></span>
    <div id="incidentsList" hidden></div>
    <button id="incidentBtn" type="button" hidden></button>
    <button id="refreshIncidentsBtn" type="button" hidden></button>
    <button id="rotateLeftBtn" type="button" hidden></button>
    <button id="rotateRightBtn" type="button" hidden></button>
    <button id="headNorthBtn" type="button" hidden></button>
    <button id="headSouthBtn" type="button" hidden></button>
    <button id="headEastBtn" type="button" hidden></button>
    <button id="headWestBtn" type="button" hidden></button>
    <span id="headingHint" hidden></span>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@turf/turf@7.2.0/turf.min.js"></script>
    <script src="/geo-distance.js?v=20260718e"></script>
    <script src="/live.js?v=20260718e"></script>
  </body>
</html>
